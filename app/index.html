<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="description" content="OI-weighted crypto perp screener and chart — heat.rip">
<title>heat.rip · OI screener</title>
<link rel="icon" href="/heat-logo.png" type="image/png">
<link rel="apple-touch-icon" href="/heat-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<link rel="preload" href="/api/tickers" as="fetch">
</head>
<body class="min-h-0">

<header id="header" class="shrink-0">
  <nav class="ftx-toolbar" aria-label="Chart controls">
    <div class="ftx-brand">
      <a href="/" class="brand-link" aria-label="heat.rip — OI screener">
        <img src="/heat-logo.png" alt="" class="brand-logo" width="1024" height="1024" decoding="async">
      </a>
      <span class="pair" id="pl">BTC/USDT</span>
    </div>
    <div class="segmented shrink-0" id="tf-exg" role="group" aria-label="Chart timeframe">
      <button type="button" class="seg-btn on" data-tf="60">1m</button>
      <button type="button" class="seg-btn" data-tf="300">5m</button>
    </div>
    <span class="field-label">Indicators</span>
    <details class="layers-dd" id="layers-dd" aria-label="Chart indicators menu">
      <summary class="seg-btn layers-sum">Indicators ▾</summary>
      <div class="layers-panel">
        <label class="layer-opt" title="Cumulative net longs (USD OI vs price)"><input type="checkbox" data-ind="netlongs" checked> Net longs</label>
        <label class="layer-opt" title="Cumulative net shorts (USD OI vs price)"><input type="checkbox" data-ind="netshorts" checked> Net shorts</label>
        <label class="layer-opt" title="Volume/range percentile osc + RSI arrows + σ-move flags"><input type="checkbox" data-ind="osc" checked> PCT oscillator</label>
        <label class="layer-opt" title="Open interest candles (USD)"><input type="checkbox" data-ind="oi"> Open Interest</label>
        <label class="layer-opt" title="Mean reversion after vol/range/OI spikes (p50 vs p95)"><input type="checkbox" data-ind="sniper" checked> Sniper</label>
        <label class="layer-opt" title="Reversion screener: $ vol &gt; p95 + RSI extremes"><input type="checkbox" data-ind="rev"> Rev screener</label>
        <label class="layer-opt" title="Vol range % p99 crossover + RSI"><input type="checkbox" data-ind="vrng"> R% vol sniper</label>
        <label class="layer-opt" title="Volume bars blended in the price pane (under candles)"><input type="checkbox" data-ind="volume"> Volume (main)</label>
        <label class="layer-opt" title="Per-venue lines for OI / net L−S"><input type="checkbox" data-ind="split"> Split by venue</label>
        <label class="layer-opt" title="Telegram: headline only if next N×1m pass fixed BTC gates (window range + net drift + one real 1m bar); server NEWS_REACT_WINDOW_MIN, MIN_RANGE, MIN_NET, MIN_BAR_RANGE, COMBINE=or. Click marker to pin tip."><input type="checkbox" data-ind="headlines"> Headlines</label>
        <label class="layer-opt" title="Mirrorly tracked traders: open positions + exits in the last 7 days"><input type="checkbox" data-ind="mirrorly"> Mirrorly</label>
        <label class="layer-opt" title="TapeSurf (Binance): thick resting liquidity — horizontal lines at top bid/ask levels per minute (~last 6h of the visible window)."><input type="checkbox" data-ind="obwalls"> OB walls</label>
      </div>
    </details>
    <span class="field-label">Venues</span>
    <div class="segmented shrink-0" id="exg" role="group" aria-label="Exchanges">
      <button type="button" class="seg-btn on" data-ex="binance-futures">Bin</button>
      <button type="button" class="seg-btn on" data-ex="bybit">Byb</button>
      <button type="button" class="seg-btn on" data-ex="okex-swap">OKX</button>
      <button type="button" class="seg-btn on" data-ex="deribit">Drb</button>
      <button type="button" class="seg-btn on" data-ex="hyperliquid">HL</button>
    </div>
    <span class="field-label">Ink</span>
    <div class="segmented shrink-0" role="group" aria-label="Annotations">
      <button type="button" class="seg-btn" id="annot-toggle" aria-pressed="false" title="Freehand ink on chart (incl. indicators). Toggle off to resize panels.">Draw</button>
      <button type="button" class="seg-btn ico" id="annot-clear" aria-label="Clear circles" title="Clear circles">×</button>
    </div>
    <div class="spacer"></div>
    <div class="toolbar-end" role="group" aria-label="Chart view">
      <button type="button" id="chart-copy" class="toolbar-ico-btn" aria-label="Copy chart as PNG" title="Copy chart as PNG to clipboard">
        <svg class="h-[1.1rem] w-[1.1rem] sm:h-5 sm:w-5" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      </button>
      <button type="button" id="theme-toggle" class="toolbar-ico-btn" aria-pressed="false" title="Use light theme" aria-label="Use light theme">
        <svg class="theme-ico-sun h-[1.1rem] w-[1.1rem] sm:h-5 sm:w-5" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32 1.41 1.41M2 12h2m16 0h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
        <svg class="theme-ico-moon hidden h-[1.1rem] w-[1.1rem] sm:h-5 sm:w-5" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
      </button>
    </div>
  </nav>
</header>

<div id="main">
  <div class="chart-card">
    <div id="cw">
      <canvas id="cv" title="Wheel: zoom time axis centered on cursor. Shift+wheel: scroll history. Drag: pan candles. Alt+drag: fine nudge. Right-drag or Shift+drag on candles: vertical price zoom. Double-click: reset."></canvas>
      <div id="sbw"><div id="sbt"></div></div>
    </div>
  </div>
  <aside class="sidebar-card" id="tp" aria-label="Markets">
    <div id="ts" class="mkt-ts">
      <input type="search" placeholder="Search markets" id="si" autocomplete="off">
      <div class="segmented shrink-0" id="sort-exg" role="group" aria-label="Sort tickers">
        <button type="button" class="seg-btn on" data-tsort="vol" title="By 24h quote volume">Vol</button>
        <button type="button" class="seg-btn" data-tsort="chg" title="By 24h change % (biggest gainers first)">%</button>
        <button type="button" class="seg-btn" data-tsort="alpha" title="Alphabetical">A–Z</button>
      </div>
    </div>
    <div id="tl" class="min-h-0 flex-1 overflow-y-auto"></div>
  </aside>
</div>

<div id="mirrorly-tip" class="mirrorly-tip" hidden></div>
<div id="news-tip" class="mirrorly-tip" hidden></div>
<script type="module" src="/js/main.js"></script>
</body>
</html>
